<!-- ALLEEN SCRIPT GEDEELTE AANGEPAST -->
<script>
const TROY = 31.1035;
let EUR = 0.92; // fallback koers

// 🔥 HAAL LIVE EUR KOERS
async function fetchFX(){
  try{
    const r = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    const d = await r.json();
    EUR = d.rates.EUR;
  }catch(e){}
}

const S = { g:{p:0,o:0,l:0,h:0,y:0}, s:{p:0,o:0,l:0,h:0,y:0}, c:{p:0,o:0,l:0,h:0,y:0} };

// FORMAT NAAR EURO
const f = (n,d=2)=>n.toLocaleString('nl-NL',{minimumFractionDigits:d,maximumFractionDigits:d});
const fu = (n,d=2)=>'€ '+f(n*EUR,d);

async function fetchLive() {
  try {
    const r = await fetch('https://api.metals.live/v1/spot/gold,silver,copper');
    const d = await r.json();
    let g,s,c;
    d.forEach(i=>{
      if(i.gold!==undefined)g=i.gold;
      if(i.silver!==undefined)s=i.silver;
      if(i.copper!==undefined)c=i.copper;
    });

    if(g && s && c && g > 1000){
      S.g.p=g; S.s.p=s; S.c.p=c;
      render();
      return;
    }
  } catch(e){}
}

// RENDER
function render(){
  document.getElementById('gp').textContent = fu(S.g.p);
  document.getElementById('gg').textContent = fu(S.g.p/TROY);

  document.getElementById('sp').textContent = fu(S.s.p);
  document.getElementById('sg').textContent = fu(S.s.p/TROY,4);

  document.getElementById('cp').textContent = fu(S.c.p,4);
  document.getElementById('ckg').textContent = fu(S.c.p*2.20462);

  document.getElementById('h-gp').textContent = fu(S.g.p);
  document.getElementById('h-sp').textContent = fu(S.s.p);
  document.getElementById('h-cp').textContent = fu(S.c.p,4);
}

// BOOT
async function boot(){
  await fetchFX();     // 💶 koers ophalen
  await fetchLive();   // 🥇 metalen ophalen
  setInterval(fetchLive,30000);
}
boot();
</script>
</script>
</body>
</html>
